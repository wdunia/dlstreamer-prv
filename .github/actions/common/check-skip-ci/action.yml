name: 'Check Skip CI'
description: 'Checks if CI should be skipped based on file changes and either skips or continues'
inputs:
  job_name:
    description: 'Name of the job for logging purposes'
    required: true
  working_directory:
    description: 'Directory where the repository was checked out'
    required: false
    default: '.'
  base_branch:
    description: 'Base branch to compare against'
    required: false
    default: 'main'
outputs:
  should_run:
    description: 'Whether the job should continue running'
    value: ${{ steps.check.outputs.should_run }}
  skip_ci:
    description: 'Whether CI should be skipped globally'
    value: ${{ steps.check.outputs.skip_ci }}
  skip_reason:
    description: 'Reason why the job was skipped'
    value: ${{ steps.check.outputs.skip_reason }}
runs:
  using: 'composite'
  steps:
    - name: Check if workflow_dispatch
      id: dispatch-check
      shell: bash
      env:
        EVENT_NAME: ${{ github.event_name }}
      run: |
        if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
          echo "🚀 Manual workflow dispatch detected - forcing execution"
          echo "is_dispatch=true" >> "$GITHUB_OUTPUT"
        else
          echo "is_dispatch=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Check if push to main branch
      id: main-push-check
      shell: bash
      env:
        BASE_BRANCH: ${{ inputs.base_branch }}
        EVENT_NAME: ${{ github.event_name }}
        REF: ${{ github.ref }}
      run: |
        if [ "${EVENT_NAME}" = "push" ] && [ "${REF}" = "refs/heads/$BASE_BRANCH" ]; then
          echo "🔄 Push to $BASE_BRANCH detected - forcing execution"
          echo "is_main_push=true" >> "$GITHUB_OUTPUT"
        else
          echo "is_main_push=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Handle manual dispatch
      if: steps.dispatch-check.outputs.is_dispatch == 'true'
      id: dispatch-handler
      shell: bash
      env:
        JOB_NAME: ${{ inputs.job_name }}
      run: |
        echo "🚀 Manual workflow dispatch - skipping file change analysis"
        echo "should_run=true" >> "$GITHUB_OUTPUT"
        echo "skip_ci=false" >> "$GITHUB_OUTPUT"
        echo "skip_reason=workflow dispatch run" >> "$GITHUB_OUTPUT"
        echo "🔄 Running $JOB_NAME - manual dispatch"

    - name: Handle main branch push
      if: steps.dispatch-check.outputs.is_dispatch == 'false' && steps.main-push-check.outputs.is_main_push == 'true'
      id: main-push-handler
      shell: bash
      env:
        JOB_NAME: ${{ inputs.job_name }}
        BASE_BRANCH: ${{ inputs.base_branch }}
      run: |
        echo "🔄 Push to $BASE_BRANCH - skipping file change analysis"
        echo "should_run=true" >> "$GITHUB_OUTPUT"
        echo "skip_ci=false" >> "$GITHUB_OUTPUT"
        echo "skip_reason=push to $BASE_BRANCH" >> "$GITHUB_OUTPUT"
        echo "🔄 Running $JOB_NAME - push to $BASE_BRANCH"

    - name: Fetch base branch for comparison
      if: steps.dispatch-check.outputs.is_dispatch == 'false' && steps.main-push-check.outputs.is_main_push == 'false'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        BASE_BRANCH: ${{ inputs.base_branch }}
      run: |
        git fetch origin $BASE_BRANCH

    - name: Check if job should run based on file changes
      if: steps.dispatch-check.outputs.is_dispatch == 'false' && steps.main-push-check.outputs.is_main_push == 'false'
      id: file-check
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        BASE_BRANCH: ${{ inputs.base_branch }}
        JOB_NAME: ${{ inputs.job_name }}
      run: |
        echo "🔍 Checking for changes outside documentation and configuration files"

        CHANGED_FILES_CODE=$(git diff --name-only origin/$BASE_BRANCH...HEAD -- \
          . \
          ':(exclude)docs/' \
          ':(exclude).github/ISSUE_TEMPLATE/' \
          ':(exclude).github/skills/' \
          ':(exclude).github/CODEOWNERS' \
          ':(exclude).github/PULL_REQUEST_TEMPLATE.md' \
          ':(exclude)README.md' \
          ':(exclude)SECURITY.md' \
          ':(exclude)LICENSE' \
          ':(exclude)CONTRIBUTING.md' \
          ':(exclude)CHANGELOG.md' \
          ':(exclude)CODESTYLE.md' \
          ':(exclude)CODE_OF_CONDUCT.md')

        SKIP_CI=true
        JOB_NAME="$JOB_NAME"

        if [ -n "${CHANGED_FILES_CODE}" ]; then
          echo "📄 Changed files outside documentation/configuration:"
          echo "${CHANGED_FILES_CODE}"
          SKIP_CI=false
          echo "🔄 Code changes detected"
        else
          echo "✅ All changes are documentation/configuration only"
        fi

        echo "skip_ci=${SKIP_CI}" >> "$GITHUB_OUTPUT"

        if [ "$SKIP_CI" = "true" ]; then
          echo "✅ Skipping $JOB_NAME - changes only in excluded files"
          echo "should_run=false" >> "$GITHUB_OUTPUT"
          echo "skip_reason=changes only in excluded files" >> "$GITHUB_OUTPUT"
        else
          echo "🔄 Running $JOB_NAME - code changes detected"
          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "skip_reason=" >> "$GITHUB_OUTPUT"
        fi

    - name: Set final outputs
      id: check
      shell: bash
      env:
        IS_DISPATCH: ${{ steps.dispatch-check.outputs.is_dispatch }}
        IS_MAIN_PUSH: ${{ steps.main-push-check.outputs.is_main_push }}
        DISPATCH_SHOULD_RUN: ${{ steps.dispatch-handler.outputs.should_run }}
        DISPATCH_SKIP_CI: ${{ steps.dispatch-handler.outputs.skip_ci }}
        DISPATCH_SKIP_REASON: ${{ steps.dispatch-handler.outputs.skip_reason }}
        MAIN_PUSH_SHOULD_RUN: ${{ steps.main-push-handler.outputs.should_run }}
        MAIN_PUSH_SKIP_CI: ${{ steps.main-push-handler.outputs.skip_ci }}
        MAIN_PUSH_SKIP_REASON: ${{ steps.main-push-handler.outputs.skip_reason }}
        FILE_SHOULD_RUN: ${{ steps.file-check.outputs.should_run }}
        FILE_SKIP_CI: ${{ steps.file-check.outputs.skip_ci }}
        FILE_SKIP_REASON: ${{ steps.file-check.outputs.skip_reason }}
      run: |
        if [ "${IS_DISPATCH}" = "true" ]; then
          echo "should_run=${DISPATCH_SHOULD_RUN}" >> "$GITHUB_OUTPUT"
          echo "skip_ci=${DISPATCH_SKIP_CI}" >> "$GITHUB_OUTPUT"
          echo "skip_reason=${DISPATCH_SKIP_REASON}" >> "$GITHUB_OUTPUT"
        elif [ "${IS_MAIN_PUSH}" = "true" ]; then
          echo "should_run=${MAIN_PUSH_SHOULD_RUN}" >> "$GITHUB_OUTPUT"
          echo "skip_ci=${MAIN_PUSH_SKIP_CI}" >> "$GITHUB_OUTPUT"
          echo "skip_reason=${MAIN_PUSH_SKIP_REASON}" >> "$GITHUB_OUTPUT"
        else
          echo "should_run=${FILE_SHOULD_RUN}" >> "$GITHUB_OUTPUT"
          echo "skip_ci=${FILE_SKIP_CI}" >> "$GITHUB_OUTPUT"
          echo "skip_reason=${FILE_SKIP_REASON}" >> "$GITHUB_OUTPUT"
        fi

    - name: Mark job as passed when skipped
      if: steps.check.outputs.should_run == 'false'
      shell: bash
      env:
        JOB_NAME: ${{ inputs.job_name }}
        SKIP_REASON: ${{ steps.check.outputs.skip_reason }}
      run: |
        echo "### ✅ Job Skipped Successfully" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Job**: $JOB_NAME" >> $GITHUB_STEP_SUMMARY
        echo "**Reason**: $SKIP_REASON" >> $GITHUB_STEP_SUMMARY
        echo "**Status**: ✅ PASSED (Skipped)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "This job was intentionally skipped to save CI resources." >> $GITHUB_STEP_SUMMARY
        exit 0
