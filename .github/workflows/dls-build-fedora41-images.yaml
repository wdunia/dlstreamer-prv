name: "[DLS] [F41] Build F41 image"
run-name: "[DLS] [F41] Build F41 image (by ${{ github.actor }})"
on:
  workflow_call:
  workflow_dispatch:
permissions: {}

env:
  DLS_REL_PATH: "./dlstreamer"

jobs:
  setup:
    name: "Setup F41 build configuration"
    runs-on: dlstreamer
    outputs:
      should_run: ${{ steps.skip-check.outputs.should_run }}
    steps:
      - name: Check out dlstreamer repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check if should skip CI
        id: skip-check
        uses: ./.github/actions/common/check-skip-ci
        with:
          job_name: "Build F41 images"
          working_directory: "."

  build:
    name: "Build f41 img"
    runs-on: dlstreamer
    needs: setup
    container:
      image: fedora:41
    permissions:
      contents: read
      packages: read
    steps:
      - name: Skip or execute based on configuration
        if: needs.setup.outputs.should_run == 'false'
        run: |
          echo "## ✅ F41 Build Skipped" >> $GITHUB_STEP_SUMMARY
          echo "**Reason:** Changes only in excluded files" >> $GITHUB_STEP_SUMMARY
          exit 0

      - name: Install dependencies
        if: needs.setup.outputs.should_run == 'true'
        run: |
          dnf update -y
          dnf install -y git docker

      - name: Check out dlstreamer repository
        if: needs.setup.outputs.should_run == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2
        with:
          persist-credentials: false
          path: dlstreamer

      - name: Init submodules
        if: needs.setup.outputs.should_run == 'true'
        run: |
          cd dlstreamer
          git submodule update --init thirdparty/spdlog

      - name: Set up Docker Buildx
        if: needs.setup.outputs.should_run == 'true'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #4.0.0

      - name: Log in to GitHub Container Registry
        if: needs.setup.outputs.should_run == 'true'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 #4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚢 Build f41 img with cache from GHCR
        if: needs.setup.outputs.should_run == 'true'
        env:
          f41_img: ghcr.io/${{ github.repository }}/f41-img:${{ github.sha }}
          f41_img_cached: ghcr.io/${{ github.repository }}/f41-img:buildcache
        run: |
          docker buildx build \
            --load \
            --target dlstreamer \
            --tag "${f41_img}" \
            --cache-from=type=registry,ref="${f41_img_cached}" \
            -f ./dlstreamer/docker/fedora41/fedora41.Dockerfile \
            ${{ env.DLS_REL_PATH }}

      - name: Clean up
        if: always() && needs.setup.outputs.should_run == 'true'
        env:
          f41_img: ghcr.io/${{ github.repository }}/f41-img:${{ github.sha }}
        run: |
          rm -rf dlstreamer
          docker rmi ${f41_img} || true
